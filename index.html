<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>voice_manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/app.css" rel="stylesheet">
</head>
<body class="app-body">
  <div class="container-fluid app-root">
    <header class="app-header row align-items-start g-2 mb-2">
      <div class="col-12 col-md">
        <p id="lblSubtitle" class="text-muted small mb-0">
          <span class="lbl-subtitle-long">ピッチ推移（縦：基準からのオクターブ／横：時間）</span>
          <span class="lbl-subtitle-short">ピッチ推移（oct × 時間）</span>
        </p>
      </div>
      <div class="col-12 col-md-auto app-actions d-grid d-sm-flex gap-2">
        <button type="button" id="btnSetBaseline" class="btn btn-outline-primary btn-sm app-touch-btn">
          今の声で自動取得
        </button>
        <button type="button" id="btnLearnNoise" class="btn btn-outline-secondary btn-sm app-touch-btn">
          周囲の音を学習
        </button>
      </div>
    </header>

    <section class="app-controls">
      <div class="row g-2 align-items-center mb-2 app-field-row">
        <div class="col-12 col-sm-auto">
          <label for="cboDevice" class="col-form-label col-form-label-sm mb-0">マイク：</label>
        </div>
        <div class="col-12 col-sm">
          <select id="cboDevice" class="form-select form-select-sm app-touch-input"></select>
        </div>
      </div>

      <div class="row g-2 align-items-center mb-2 app-field-row">
        <div class="col-12 col-sm-auto">
          <label for="txtBaselineHz" class="col-form-label col-form-label-sm mb-0">基準（Hz）：</label>
        </div>
        <div class="col-12 col-sm">
          <input type="text" id="txtBaselineHz" class="form-control form-control-sm app-touch-input" placeholder="例 220.5" inputmode="decimal">
        </div>
      </div>

      <div class="row g-2 align-items-center mb-2 app-field-row app-target-row">
        <div class="col-12 col-sm-auto">
          <label for="txtTargetOctave" class="col-form-label col-form-label-sm mb-0">目標（オクターブ）：</label>
        </div>
        <div class="col-auto">
          <input type="checkbox" id="chkTargetEnabled" class="form-check-input app-touch-check" checked>
        </div>
        <div class="col">
          <input type="text" id="txtTargetOctave" class="form-control form-control-sm app-touch-input" placeholder="例 1.5" inputmode="decimal">
        </div>
      </div>
    </section>

    <p id="lblPitch" class="app-pitch mb-2">--- Hz　基準ピッチは未設定</p>

    <section class="app-graph graph-wrap border rounded bg-white">
      <canvas id="picPitch"></canvas>
      <p id="graphHint" class="graph-hint text-muted small">音声を入力するとグラフが表示されます。</p>
    </section>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/voice-constants.js"></script>
  <script src="js/pitch.js"></script>
  <script src="js/trial-limit.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
